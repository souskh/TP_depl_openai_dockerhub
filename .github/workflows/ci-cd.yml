name: CI-CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx

      - name: Run unit tests
        run: PYTHONPATH=. pytest tests/units -q

  push-image-to-acr:
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      IMAGE_REPO: ${{ secrets.ACR_REPOSITORY }}
      RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
      CONTAINERAPP_NAME: ${{ vars.CONTAINERAPP_NAME }}
      CONTAINERAPPS_ENV: ${{ vars.CONTAINERAPPS_ENV }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate CI/CD config
        run: |
          if [ -z "$ACR_NAME" ]; then
            echo "Missing required secret: ACR_NAME"
            exit 1
          fi
          # Accept either short registry name (monacrhf12345) or login server
          # (monacrhf12345.azurecr.io) and normalize for az acr commands.
          ACR_NAME_NORMALIZED="${ACR_NAME%.azurecr.io}"
          echo "ACR_NAME=$ACR_NAME_NORMALIZED" >> "$GITHUB_ENV"
          if [ -z "${IMAGE_REPO}" ]; then
            echo "ACR_REPOSITORY is empty, defaulting to hf-fastapi"
            echo "IMAGE_REPO=hf-fastapi" >> "$GITHUB_ENV"
          fi
          if [ -z "${ACR_LOGIN_SERVER}" ]; then
            echo "ACR_LOGIN_SERVER not set, using ${ACR_NAME}.azurecr.io"
            echo "ACR_LOGIN_SERVER=${ACR_NAME}.azurecr.io" >> "$GITHUB_ENV"
          fi
          if [ -z "${RESOURCE_GROUP}" ]; then
            echo "Missing required secret: RESOURCE_GROUP"
            exit 1
          fi
          if [ -z "${HUGGINGFACE_API_KEY}" ]; then
            echo "Missing required secret: HUGGINGFACE_API_KEY"
            exit 1
          fi
          if [ -z "${CONTAINERAPP_NAME}" ]; then
            echo "Missing required repository variable: CONTAINERAPP_NAME"
            echo "Set it in GitHub: Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi
          if [ -z "${CONTAINERAPPS_ENV}" ]; then
            echo "CONTAINERAPPS_ENV not set, using default: hf-env"
            echo "CONTAINERAPPS_ENV=hf-env" >> "$GITHUB_ENV"
          fi

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build and push Docker image
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64 \
            -t "${ACR_LOGIN_SERVER}/${IMAGE_REPO}:latest" \
            -t "${ACR_LOGIN_SERVER}/${IMAGE_REPO}:${GITHUB_SHA}" \
            --push .

      - name: Deploy Container App (create if missing)
        run: |
          IMAGE_TAGGED="${ACR_LOGIN_SERVER}/${IMAGE_REPO}:${GITHUB_SHA}"
          if az containerapp show --name "$CONTAINERAPP_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "Updating existing app: $CONTAINERAPP_NAME"
            az containerapp update \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$IMAGE_TAGGED" \
              --set-env-vars "HUGGINGFACE_API_KEY=$HUGGINGFACE_API_KEY"
          else
            echo "Creating app: $CONTAINERAPP_NAME in env: $CONTAINERAPPS_ENV"
            ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)"
            az containerapp create \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$CONTAINERAPPS_ENV" \
              --image "$IMAGE_TAGGED" \
              --target-port 8000 \
              --ingress external \
              --registry-server "$ACR_LOGIN_SERVER" \
              --registry-username "$ACR_NAME" \
              --registry-password "$ACR_PASSWORD" \
              --env-vars "HUGGINGFACE_API_KEY=$HUGGINGFACE_API_KEY"
          fi
