name: CI-CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run unit tests
        run: pytest tests/units -q

  push-image-to-acr:
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      IMAGE_REPO: ${{ secrets.ACR_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate CI/CD secrets
        run: |
          if [ -z "$ACR_NAME" ]; then
            echo "Missing required secret: ACR_NAME"
            exit 1
          fi
          if [ -z "${IMAGE_REPO}" ]; then
            echo "ACR_REPOSITORY is empty, defaulting to hf-fastapi"
            echo "IMAGE_REPO=hf-fastapi" >> "$GITHUB_ENV"
          fi
          if [ -z "${ACR_LOGIN_SERVER}" ]; then
            echo "ACR_LOGIN_SERVER not set, using ${ACR_NAME}.azurecr.io"
            echo "ACR_LOGIN_SERVER=${ACR_NAME}.azurecr.io" >> "$GITHUB_ENV"
          fi

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build and push Docker image
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64 \
            -t "$ACR_LOGIN_SERVER/$IMAGE_REPO:latest" \
            -t "$ACR_LOGIN_SERVER/$IMAGE_REPO:${GITHUB_SHA}" \
            --push .
